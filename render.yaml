# Render Blueprint: https://docs.render.com/docs/blueprint-spec
# Liga o repositório no Render → Blueprint → aponta para este ficheiro.
#
# Segredos (sync: false): preencher no painel após criar o serviço.
# DATABASE_URL: PostgreSQL (ex.: instância Render Postgres → postgresql://...)
# VITE_*: devem existir no ambiente do Render antes do build — o Vite embute-as no cliente.
# Autenticação: AUTH_MODE=local + VITE_AUTH_MODE=local para login com email/senha (VITE_* no build).
# Com AUTH_MODE=none o utilizador "Usuário (auth desligada)" entra sem login (só testes/legado).
# OAuth institucional (WebDev) com login local: OAUTH_SERVER_URL + VITE_OAUTH_PORTAL_URL + VITE_APP_ID
# (preencha no painel, rebuild com VITE_*). Registo: https://<serviço>.onrender.com/api/oauth/callback
# O package.json fixa pnpm@10.4.1 (packageManager) e há patches pnpm (ex.: wouter). `npm ci` com
# package-lock.json ignora pnpm-lock.yaml e o ecossistema pnpm. Build com Corepack + pnpm.
# No Render, NODE_ENV=production faz o pnpm instalar só dependências de produção; o Vite fica
# de fora. Usamos env NODE_ENV=development só no `pnpm install` (Vite e build) e o `vite build` fixa
# modo produção internamente. Não use --include dev (não existe no `pnpm install` do pnpm 10).

services:
  - type: web
    name: contradef-log-analyzer
    runtime: node
    plan: free
    region: frankfurt
    rootDir: ai_correlacion_web
    # No painel do Render, defina a mesma Build Command e NODE_VERSION 20+ (Corepack).
    buildCommand: corepack enable && corepack prepare pnpm@10.4.1 --activate && env NODE_ENV=development pnpm install --frozen-lockfile && pnpm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: AUTH_MODE
        value: local
      - key: VITE_AUTH_MODE
        value: local
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OAUTH_SERVER_URL
        sync: false
      - key: VITE_APP_ID
        sync: false
      - key: VITE_OAUTH_PORTAL_URL
        sync: false
      - key: OWNER_OPEN_ID
        sync: false
